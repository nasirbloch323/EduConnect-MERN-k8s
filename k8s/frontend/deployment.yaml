apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: educonnect
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nasirbloch323/educonnect:v1
        ports:
        - containerPort: 80
