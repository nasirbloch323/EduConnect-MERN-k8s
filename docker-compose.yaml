version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: educonnect-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  backend:
    build: ./backend          # ← server/ ki jagah backend/
    container_name: educonnect-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://admin:password123@mongodb:27017/educonnect?authSource=admin
      - JWT_SECRET=your-secret-key
      - NODE_ENV=production
    depends_on:
      - mongodb

  frontend:
    build: ./frontend         # ← client/ ki jagah frontend/
    container_name: educonnect-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
